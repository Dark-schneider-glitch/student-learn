apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-deploy

spec:
  replicas: 5
  selector:
    matchLabels:
      app: hello-world

  minReadySeconds: 10

  strategy:
    type: Recreate
    
  template:
    metadata:
      annotations:
        kubernetes.io/change-cause: "v1"
      labels:
        app: hello-world

    spec:
      containers:
        - name: hello-pod
          image: ghanshyamit100/gstrainig:v1
          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: hello-deploy-svc
  labels:
    app: hello-world
spec:
  selector:
    app: hello-world
  ports:
  - port: 8000
    
  